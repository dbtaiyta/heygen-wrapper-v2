version: '3.8'

services:
  heygen-wrapper:
    build: .
    ports:
      - "8370:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me}
      - VIDEO_RETENTION_HOURS=${VIDEO_RETENTION_HOURS:-24}
      - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-1}
      - REDIS_URL=redis://redis:6379
      - VIDEOS_DIR=/videos
      - CHROME_PROFILE_DIR=/data/chrome-profile
      - DATA_DIR=/data
      - HEADED_DEBUG=${HEADED_DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ./data:/data
      - ./videos:/videos
    shm_size: '2gb'
    ipc: host
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  redis-data:
